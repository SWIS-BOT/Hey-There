kind = "web"
previewPath = "/"
title = "Roblox Profile Lookup"
version = "1.0.0"
id = "artifacts/roblox-lookup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23127

[services.development]
run = "pnpm --filter @workspace/roblox-lookup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roblox-lookup", "run", "build" ]
publicDir = "artifacts/roblox-lookup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23127"
BASE_PATH = "/"
